<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Signalanlæg – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
      --primary: #3b82f6; --primary-hover: #2563eb;
      --danger: #ef4444; --text: #e2e8f0; --text-muted: #94a3b8;
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; padding-top: max(1rem, env(safe-area-inset-top)); }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; }
    .logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .logo-icon { font-size: 2rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 700; }
    .logo p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 16px; color: var(--text); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--primary); }
    button { width: 100%; background: var(--primary); border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; color: white; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; min-height: 48px; }
    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .fejl { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: #fca5a5; margin-top: 1rem; display: none; }
    .fejl.synlig { display: block; }
    .version { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span class="logo-icon">🚦</span>
      <div>
        <h1>Signalanlæg</h1>
        <p>Kategoriseringsværktøj</p>
      </div>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="din@email.dk" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Adgangskode</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button id="login-btn">Log ind</button>
    <div class="fejl" id="fejl-besked"></div>
    <div class="version">v2.0 · NIL/KLO</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Tjek om allerede logget ind
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    const loginBtn = document.getElementById('login-btn');
    const fejl = document.getElementById('fejl-besked');

    function visFejl(tekst) {
      fejl.textContent = tekst;
      fejl.classList.add('synlig');
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') loginBtn.click();
    });

    loginBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { visFejl('Udfyld email og adgangskode'); return; }
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logger ind...';
      fejl.classList.remove('synlig');
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        visFejl('Forkert email eller adgangskode');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log ind';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
