<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Signalanlæg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Signalanlæg – Kategoriseringsværktøj</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <header class="app-header">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <h1>Signalanlæg</h1>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span id="bruger-navn" style="font-size:12px;color:rgba(255,255,255,0.7)"></span>
        <button id="logout-btn" title="Log ud" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:white;font-size:12px;cursor:pointer;padding:6px 10px;min-height:36px">Log ud</button>
        <span class="app-credit">NIL/KLO</span>
      </div>
    </div>
    <p class="subtitle">Kategoriseringsværktøj for master og signaler</p>
  </header>

  <main class="app-main">

    <!-- Anlægs-felter -->
    <section class="card">
      <h2>Anlæg</h2>
      <div class="grid">
        <div class="field">
          <label for="anlaeg-nr">Anlægsnummer</label>
          <input type="text" id="anlaeg-nr" placeholder="fx 1901-295" />
        </div>
<div class="field field-wide">
          <label for="anlaeg-navn">Anlæggets navn</label>
          <input type="text" id="anlaeg-navn" placeholder="fx Hovedgade/Sidegade" />
        </div>

      </div>
      <div class="button-row">
        <button id="nyt-anlaeg-btn" class="btn-secondary">Nyt anlæg</button>
      </div>
    </section>

    <!-- Gem/indlæs -->
    <section class="card">
      <h2>Gemte anlæg</h2>
      <div class="field" style="margin-bottom:0.6rem">
        <select id="gemte-anlaeg" style="width:100%">
          <option value="">— Vælg gemt anlæg —</option>
        </select>
      </div>
      <div class="button-row">
        <button id="indlaes-btn" class="btn-secondary btn-gem-row">Indlæs</button>
        <button id="omdoeb-btn" class="btn-secondary btn-gem-row">Omdøb</button>
        <button id="slet-btn" class="btn-danger btn-gem-row">Slet</button>
        <button id="gem-btn" class="btn-primary btn-gem-row">Gem</button>
      </div>
      <div id="omdoeb-container" style="display:none;margin-top:0.5rem">
        <div class="button-row">
          <input type="text" id="omdoeb-input" placeholder="Nyt anlægsnummer" style="flex:1" />
          <button class="btn-primary btn-gem-row" onclick="bekraeftOmdoeb()">Gem navn</button>
          <button class="btn-secondary btn-gem-row" onclick="document.getElementById('omdoeb-container').style.display='none'">Annullér</button>
        </div>
      </div>
      <div class="button-row" style="margin-top:0.5rem">
        <button id="export-json-enkelt-btn" class="btn-secondary btn-gem-row">Eksportér dette</button>
        <button id="export-json-btn" class="btn-secondary btn-gem-row">Eksportér alle</button>
      </div>
      <div class="button-row" style="margin-top:0.5rem">
        <button id="gem-alle-supabase-btn" class="btn-secondary btn-gem-row">↑ Gem alle til sky</button>
        <label for="import-json-input" class="btn-secondary btn-label btn-gem-row">Importér</label>
        <input type="file" id="import-json-input" accept="application/json" hidden />
      </div>
    </section>


    <!-- Tilføj mast -->
    <section class="card">
      <h2>Tilføj mast</h2>
      <div class="grid">
        <div class="field">
          <label for="ny-mast-id">Mast-ID</label>
          <input type="text" id="ny-mast-id" placeholder="fx S1" />
        </div>
        <div class="field field-wide">
          <label for="ny-mastetype">Mastetype</label>
          <select id="ny-mastetype">
            <option value="">— Vælg mastetype —</option>
          </select>
        </div>
      </div>
      <div class="button-row">
        <button id="tilfoej-mast-btn" class="btn-primary">+ Tilføj mast</button>
      </div>
    </section>

    <!-- Mast-liste -->
    <section id="master-liste"></section>

    <!-- Output -->
    <section class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <button class="btn-collapse" id="toggle-output-btn">▸</button>
          <h2 style="margin:0">Output</h2>
        </div>
        <div class="button-row" id="output-controls" style="display:none">
          <div class="output-row-1">
            <select id="format-vaelger">
              <option value="md">Markdown (.md)</option>
              <option value="txt">Tekst (.txt)</option>
            </select>
            <button id="kopier-btn" class="btn-secondary">Kopiér</button>
            <button id="download-btn" class="btn-primary">Download</button>
          </div>
          <div class="output-row-2">
            <select id="stykliste-format">
              <option value="md">Stykliste .md</option>
              <option value="txt">Stykliste .txt</option>
            </select>
            <button id="download-stykliste-btn" class="btn-secondary">Download stykliste</button>
          </div>
        </div>
      </div>
      <div id="output-indhold" style="display:none">
        <div id="mast-filter-wrap" class="mast-filter-wrap" style="display:none">
          <div class="mast-filter-header">
            <span class="mast-filter-label">Inkluder master:</span>
            <button type="button" id="filter-alle-btn" class="btn-small">Alle</button>
            <button type="button" id="filter-ingen-btn" class="btn-small">Ingen</button>
          </div>
          <div id="mast-filter-checkboxes" class="mast-filter-checkboxes"></div>
        </div>
        <textarea id="output" readonly></textarea>
        <p id="status-besked"></p>
      </div>
    </section>


  </main>

  <script src="app.js"></script>
</body>
</html>
